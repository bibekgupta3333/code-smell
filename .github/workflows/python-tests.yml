name: Python Unit Tests

# L5: Keep the response_parser alias contract locked down in CI so LLM output
# drift (plural keys, dict locations, bare lists, severity aliases) can't
# silently break results display again.

on:
  push:
    paths:
      - "src/llm/response_parser.py"
      - "src/utils/smell_catalog.py"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/python-tests.yml"
  pull_request:
    paths:
      - "src/llm/response_parser.py"
      - "src/utils/smell_catalog.py"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/python-tests.yml"
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run response_parser tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/test_response_parser.py -q
